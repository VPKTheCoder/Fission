<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>404 — Lost in Space | FISSION</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: Georgia, 'Times New Roman', serif;
        background: #050505;
        color: #f6efe5;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 1rem;
      }
      .container { max-width: 28rem; }
      h1 {
        font-size: clamp(4rem, 15vw, 7rem);
        font-style: italic;
        font-weight: 400;
        text-shadow: 0 0 2.4rem rgba(255, 241, 211, 0.24);
        animation: textGlow 4s ease-in-out infinite;
      }
      p {
        margin: 1rem 0 2rem;
        color: rgba(246, 239, 229, 0.6);
        font-size: clamp(1rem, 2.5vw, 1.2rem);
        line-height: 1.5;
      }
      a {
        display: inline-block;
        padding: 0.88rem 1.8rem;
        border: 1px solid rgba(255,255,255,0.42);
        border-radius: 6px;
        color: #17130d;
        background: linear-gradient(180deg, #fff8eb, #e7d4ae);
        font-weight: 800;
        font-size: 1rem;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        text-decoration: none;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      a:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 24px rgba(246,201,107,0.15); }
      @keyframes textGlow {
        0%, 100% { text-shadow: 0 0 2rem rgba(255, 241, 211, 0.2); }
        50% { text-shadow: 0 0 3rem rgba(255, 241, 211, 0.35), 0 0 5rem rgba(246, 201, 107, 0.12); }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <p>This cell doesn't exist on the grid. <br/>Maybe it collapsed into a singularity.</p>
      <a href="/">Return to Reactor</a>
    </div>
  </body>
</html>
